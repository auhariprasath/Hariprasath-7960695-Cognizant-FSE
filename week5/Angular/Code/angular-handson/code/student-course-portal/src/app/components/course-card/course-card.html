<div class="course-card" [ngClass]="cardClasses" [ngStyle]="{ 'border-left-color': borderColor }">
  <h3>{{ course.name }}</h3>
  <p>Code: {{ course.code }}</p>
  <p>Credits: {{ course.credits | creditLabel }}</p>
  

  <span [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" class="badge badge--green">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge badge--red">Failed</span>
    <span *ngSwitchDefault class="badge badge--grey">Pending</span>
  </span>

  <button (click)="toggleExpanded()">Show Details</button>
  <button (click)="enrollRequested.emit(course.id)">Enroll</button>
</div>
